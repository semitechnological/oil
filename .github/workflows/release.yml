name: CI / Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to rebuild (e.g. 0.8.5). Skips version check, tag, release creation — only builds and attaches binaries.'
        required: true

permissions:
  contents: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo check
        run: cargo check

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy -- -D warnings
        continue-on-error: true
  check-version:
    name: Check for version bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      prev_tag: ${{ steps.check.outputs.prev_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: check
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Tag push for v$VERSION"
            PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | grep -v "^v${VERSION}$" | head -1 || echo "")
            echo "Previous tag: $PREV_TAG"
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Workflow dispatch for v$VERSION"
            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            echo "Previous tag: $PREV_TAG"
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            CURRENT_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "Current version: $CURRENT_VERSION"

            git show HEAD^:Cargo.toml > /tmp/old_cargo.toml 2>/dev/null || echo 'version = "0.0.0"' > /tmp/old_cargo.toml
            PREV_VERSION=$(grep '^version' /tmp/old_cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "Previous version: $PREV_VERSION"

            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            echo "Previous tag: $PREV_TAG"
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

            if git ls-remote --tags origin | grep -q "refs/tags/v$CURRENT_VERSION"; then
              echo "Tag v$CURRENT_VERSION already exists, skipping release"
              echo "should_release=false" >> $GITHUB_OUTPUT
            elif [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
              echo "Version changed from $PREV_VERSION to $CURRENT_VERSION"
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            else
              echo "Version unchanged, skipping release"
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          fi

  generate-notes:
    name: Generate release notes
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    outputs:
      release_notes: ${{ steps.generate.outputs.notes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes from git history
        id: generate
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          PREV_TAG="${{ needs.check-version.outputs.prev_tag }}"

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD)
            RANGE="${FIRST_COMMIT}..HEAD"
          fi

          NOTES=$(git log "$RANGE" --pretty=format:'- %s' --no-merges 2>/dev/null || true)

          if [ -z "$NOTES" ]; then
            if [ -n "$PREV_TAG" ]; then
              NOTES="## What's Changed
          See the [full changelog](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${VERSION}) for details."
            else
              NOTES="## Release v${VERSION}
          Initial release."
            fi
          fi

          echo "$NOTES" > /tmp/release_notes.md

          echo "notes<<NOTES_EOF" >> $GITHUB_OUTPUT
          cat /tmp/release_notes.md >> $GITHUB_OUTPUT
          echo "NOTES_EOF" >> $GITHUB_OUTPUT

  create-tag:
    name: Create release tag
    runs-on: ubuntu-latest
    needs: [check-version, generate-notes]
    if: needs.check-version.outputs.should_release == 'true' && github.ref_type != 'tag'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          TAG="v${{ needs.check-version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists, skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [check-version, generate-notes, create-tag]
    if: always() && needs.check-version.outputs.should_release == 'true'
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: ${{ needs.generate-notes.outputs.release_notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.distro }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    needs: [check-version, create-release]
    if: always() && (needs.check-version.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch')
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            arch: x64
            target: x86_64-unknown-linux-gnu
            asset_name: oil-linux-x64
            container: ubuntu:24.04

          - distro: ubuntu
            arch: arm64
            target: aarch64-unknown-linux-gnu
            asset_name: oil-linux-arm64
            container: ubuntu:24.04

          - distro: fedora
            arch: x64
            target: x86_64-unknown-linux-gnu
            asset_name: oil-linux-x64-fedora
            container: fedora:latest

          - distro: arch
            arch: x64
            target: x86_64-unknown-linux-gnu
            asset_name: oil-linux-x64-arch
            container: archlinux:latest

          - distro: alpine
            arch: x64
            target: x86_64-unknown-linux-musl
            asset_name: oil-linux-x64-musl
            container: alpine:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Debian)
        if: contains(matrix.container, 'ubuntu')
        run: |
          apt-get update
          apt-get install -y curl gcc g++ pkg-config libssl-dev

      - name: Install system deps (Fedora)
        if: contains(matrix.container, 'fedora')
        run: |
          dnf install -y curl gcc gcc-c++ pkg-config openssl-devel

      - name: Install system deps (Arch)
        if: contains(matrix.container, 'arch')
        run: |
          pacman -Syu --noconfirm curl gcc pkg-config openssl

      - name: Install system deps (Alpine)
        if: contains(matrix.container, 'alpine')
        run: |
          apk add curl gcc g++ pkgconfig openssl-dev musl-dev

      - name: Install cross-compilation tools (ARM64)
        if: matrix.arch == 'arm64'
        run: |
          apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
        env:
          HOME: /root

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        run: |
          cp target/${{ matrix.target }}/release/oil ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Checksum
        run: |
          sha256sum ${{ matrix.asset_name }} | awk '{print $1}' > ${{ matrix.asset_name }}.sha256

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version || github.event.inputs.version }}
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [check-version, build]
    if: always() && (needs.check-version.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch') && !failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true
